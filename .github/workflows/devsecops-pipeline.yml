name: DevSecOps CI/CD Security Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-audit:
    name: Run Security Audits
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so scanners can compare commits

      # 1. Secret Scanning with TruffleHog
      - name: Secret Scanning (Trufflehog)
        uses: trufflesecurity/trufflehog-main-action@main
        with:
          path: ./
          base: ""
          head: HEAD
          extra_args: --only-verified

      # 2. Static Analysis (SAST) with Semgrep
      - name: SAST Scan (Semgrep)
        uses: semgrep/semgrep-action@v1
        with:
          config: p/default